start_cycle_point: '2021-06-01T12:00:00Z'
final_cycle_point: '2021-06-02T00:00:00Z'
runahead_limit: P2
jedi_build_method: use_existing
geos_build_method: use_existing
model_components: ['geos_marine']
models:
  geos_marine:
    cycle_times:
    - T00
    - T06
    - T12
    - T18
    window_length: PT6H
    window_offset: PT3H
    horizontal_resolution: 72x36
    vertical_resolution: '50'
    total_processors: 6
    observations:
     - adt_cryosat2n
     - adt_jason3
     - adt_saral
     - adt_sentinel3a
     - adt_sentinel3b
     - insitu_profile_argo
     - sst_ostia
     - sss_smos
     - sss_smapv5
     - sst_abi_g16_l3c
     - sst_gmi_l3u
     - sst_viirs_n20_l3u
     - temp_profile_xbt
    number_of_iterations:
    - 10
    obs_provider: ['odas', 'gdas_marine']
    mom6_iau: True
    analysis_forecast_window_offset: -PT3H
    background_time_offset: PT9H
    clean_patterns:
    - '*.nc4'
    - '*.txt'
    - '*.rc'
    - '*.bin'
