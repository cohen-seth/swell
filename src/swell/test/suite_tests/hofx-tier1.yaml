jedi_build_method: use_existing
save_geovals: true
model_components: ['geos_atmosphere', 'geos_ocean']
models:
  geos_atmosphere:
    horizontal_resolution: '91'
    npx_proc: 2
    npy_proc: 2
    observations:
    - aircraft
    - airs_aqua
    - amsr2_gcom-w1
    - amsua_aqua
    - amsua_metop-b
    - amsua_metop-c
    - amsua_n15
    - amsua_n18
    - amsua_n19
    - atms_n20
    - atms_npp
    - avhrr3_metop-b
    - avhrr3_n18
    - avhrr3_n19
    - cris-fsr_n20
    - cris-fsr_npp
    - gmi_gpm
    - gps
    - iasi_metop-b
    - iasi_metop-c
    - mhs_metop-b
    - mhs_metop-c
    - mhs_n19
    - mls55_aura
    - omi_aura
    - ompsnm_npp
    - pibal
    - satwind
    - scatwind
    - sfcship
    - sfc
    - sondes
    - ssmis_f17
    clean_patterns: []
  geos_ocean:
    obs_experiment: s2s_v1
    obs_provider: ['odas', 'gdas_marine']
    horizontal_resolution: 72x36
    vertical_resolution: '50'
    observations:
    - adt_cryosat2n
    - adt_jason3
    - adt_saral
    - adt_sentinel3a
    - adt_sentinel3b
    - insitu_profile_argo
    - sst_ostia
    - sss_smos
    - sss_smapv5
    - temp_profile_xbt
