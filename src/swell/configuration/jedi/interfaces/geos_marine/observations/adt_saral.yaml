obs space:
  name: adt_saral
  obsdatain:
    engine:
      type: H5File
      obsfile: '{{cycle_dir}}/adt_saral.{{window_begin}}.nc4'
  obsdataout:
    engine:
      type: H5File
      obsfile: '{{cycle_dir}}/{{experiment_id}}.adt_saral.{{window_begin}}.nc4'
  simulated variables: [absoluteDynamicTopography]
obs operator:
  name: ADT
obs error:
  covariance model: diagonal
obs filters:
- filter: Domain Check
  where:
  - variable: {name: GeoVaLs/sea_area_fraction}
    minvalue: 0.9
- filter: Domain Check
  where:
  - variable: { name: GeoVaLs/sea_surface_temperature}
    minvalue: 7.5
- filter: Background Check
  absolute threshold: 0.2
- filter: Domain Check
  where:
  - variable: {name: GeoVaLs/sea_floor_depth_below_sea_surface}
    minvalue: 500
- filter: Domain Check
  where:
  - variable: { name: GeoVaLs/distance_from_coast}
    minvalue: 100e3
{% if 'cice6' in marine_models %}
- filter: Domain Check
  where:
  - variable: { name: GeoVaLs/sea_ice_area_fraction}
    maxvalue: 0.00001
{% endif %}
