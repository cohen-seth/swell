obs space:
  name: sst_viirs_npp_l3u
  obsdatain:
    engine:
      type: H5File
      obsfile: '{{cycle_dir}}/sst_viirs_npp_l3u.{{window_begin}}.nc4'
  obsdataout:
    engine:
      type: H5File
      obsfile: '{{cycle_dir}}/{{experiment_id}}.sst_viirs_npp_l3u.{{window_begin}}.nc4'
  simulated variables: [seaSurfaceTemperature]
get values:
  time interpolation: linear
obs operator:
  name: Identity
  observation alias file: '{{experiment_root}}/{{experiment_id}}/configuration/jedi/interfaces/{{model_component}}/observations/obsop_name_map.yaml'
obs error:
  covariance model: diagonal
obs filters:
- filter: Domain Check
  where:
  - variable: {name: GeoVaLs/sea_area_fraction}
    minvalue: 0.9
- filter: Bounds Check
  minvalue: -1.0
  maxvalue: 40.0
- filter: Background Check
  absolute threshold: 5.0
- filter: Domain Check
  where:
  - variable: {name: ObsError/seaSurfaceTemperature}
    minvalue: 1.0e-8
- filter: Domain Check
  where:
  - variable: {name: GeoVaLs/distance_from_coast}
    minvalue: 100e3
- filter: Perform Action
  action:
    name: assign error
    error function:
      name: ObsFunction/LinearCombination
      options:
        variables:
        - ObsError/seaSurfaceTemperature
        coefs:
        - 1.0
{% if 'cice6' in marine_models %}
- filter: Domain Check
  where:
  - variable: { name: GeoVaLs/sea_ice_area_fraction}
    maxvalue: 0.00001
{% endif %}
